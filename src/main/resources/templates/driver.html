<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assigned Drivers — RapidCare</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f3f0;
  --surface: #ffffff;
  --surface2: #f9f7f5;
  --border: #e8e2db;
  --red: #d93025;
  --text: #1a1714;
  --muted: #9a8f85;
  --accent: #2563eb;
  --green: #16a34a;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 40px 20px;
  background-image:
    radial-gradient(ellipse 70% 60% at 5% 80%, rgba(217,48,37,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 95% 10%, rgba(37,99,235,0.04) 0%, transparent 55%);
}
.container { max-width:640px; margin:0 auto; animation:fadeUp 0.45s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.back-link { display:inline-flex; align-items:center; gap:6px; color:var(--muted); text-decoration:none; font-size:14px; margin-bottom:26px; transition:color 0.18s; }
.back-link:hover { color:var(--text); }
.page-title { font-family:'Syne',sans-serif; font-weight:800; font-size:30px; letter-spacing:-0.8px; margin-bottom:5px; }
.page-title span { color:var(--green); }
.subtitle { color:var(--muted); font-size:14px; margin-bottom:26px; }
.driver-table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.05); }
.table-header { display:grid; grid-template-columns:1fr 1.5fr; padding:12px 20px; background:var(--surface2); border-bottom:1px solid var(--border); font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; }
.driver-row { display:grid; grid-template-columns:1fr 1.5fr; padding:16px 20px; border-bottom:1px solid var(--border); align-items:center; transition:background 0.15s; }
.driver-row:last-child { border-bottom:none; }
.driver-row:hover { background:var(--surface2); }
.driver-name { display:flex; align-items:center; gap:10px; font-size:14px; font-weight:500; }
.driver-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,rgba(37,99,235,0.15),rgba(217,48,37,0.1)); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.location-cell { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); }
.location-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px rgba(22,163,74,0.5); flex-shrink:0; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
</style>
</head>
<body>
  <div id="mapSimulation"
     style="display:none; position:fixed; inset:0; background:white; z-index:9999;">

    <iframe src="/ambulance.html"
            style="width:100%; height:100%; border:none;">
    </iframe>
</div>
<div class="container">
  <a href="/dashboard" class="back-link">← Back to Dashboard</a>
  <div class="page-title">Assigned <span>Drivers</span></div>
  <p class="subtitle">Your ambulance details are below...</p>
  <div class="driver-table-wrap">
    <div class="table-header">
        <div>Driver Name</div>
        <div>Phone Number</div>
    </div>

    <div class="driver-row">
        <div class="driver-name"
             th:text="${booking != null and booking.driver != null ? booking.driver.name : 'No driver assigned'}">
        </div>

        <div class="location-cell"
             th:text="${booking != null and booking.driver != null ? booking.driver.phone : 'Pending'}">
        </div>
    </div>
</div>
  </div>
</div>
<script>
    setTimeout(function () {
        const otp = Math.floor(1000 + Math.random() * 9000);

        alert("🚑 Driver has reached!\nPlease enter OTP: " + otp);

        document.getElementById("mapSimulation").style.display = "block";

        setTimeout(function () {
            window.location.href = "/dashboard";
        }, 5000);

    }, 5000);
</script>
</body>
</html>
