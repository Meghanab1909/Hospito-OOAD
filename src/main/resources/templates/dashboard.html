<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Hospito</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f3f0;
  --surface: #ffffff;
  --surface2: #f9f7f5;
  --border: #e8e2db;
  --red: #d93025;
  --red-dim: rgba(217,48,37,0.08);
  --red-glow: rgba(217,48,37,0.18);
  --text: #1a1714;
  --muted: #9a8f85;
  --accent: #2563eb;
  --green: #16a34a;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-image:
    radial-gradient(ellipse 70% 60% at 5% 80%, rgba(217,48,37,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 95% 10%, rgba(37,99,235,0.05) 0%, transparent 55%);
}
.container { width:100%; max-width:480px; padding:20px; animation:fadeUp 0.45s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.header { display:flex; align-items:center; gap:12px; margin-bottom:38px; }
.logo-icon { width:40px; height:40px; background:var(--red); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 2px 12px var(--red-glow); }
.logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; letter-spacing:-0.5px; }
.logo-text span { color:var(--red); }
h2 { font-family:'Syne',sans-serif; font-weight:700; font-size:30px; letter-spacing:-0.8px; margin-bottom:6px; }
.subtitle { color:var(--muted); font-size:15px; font-weight:300; margin-bottom:32px; }
.cards-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.action-card {
  display:flex; flex-direction:column; align-items:flex-start; gap:12px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:18px;
  padding:24px 20px;
  text-decoration:none;
  color:var(--text);
  transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
}
.action-card:hover { transform:translateY(-2px); }
.action-card.primary:hover { border-color:rgba(217,48,37,0.35); box-shadow:0 8px 28px rgba(217,48,37,0.1); }
.action-card.secondary:hover { border-color:rgba(37,99,235,0.3); box-shadow:0 8px 28px rgba(37,99,235,0.08); }
.card-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
.action-card.primary .card-icon { background:rgba(217,48,37,0.09); }
.action-card.secondary .card-icon { background:rgba(37,99,235,0.09); }
.card-title { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; line-height:1.2; }
.card-desc { font-size:13px; color:var(--muted); font-weight:300; line-height:1.5; }
.card-arrow { margin-top:auto; font-size:18px; color:#ccc; transition:color 0.2s,transform 0.2s; }
.action-card.primary:hover .card-arrow { color:var(--red); transform:translateX(4px); }
.action-card.secondary:hover .card-arrow { color:var(--accent); transform:translateX(4px); }
.status-bar { display:flex; align-items:center; gap:8px; margin-top:24px; padding:13px 18px; background:var(--surface); border:1px solid var(--border); border-radius:12px; font-size:13px; color:var(--muted); box-shadow:0 1px 6px rgba(0,0,0,0.04); }
.status-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px rgba(22,163,74,0.5); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-icon">🚑</div>
    <div class="logo-text">Hospito</span></div>
  </div>
  <h2>Dashboard</h2>
  <p class="subtitle">What do you need right now?</p>
  <div class="cards-grid">
    <a href="/book" class="action-card primary">
      <div class="card-icon">🚨</div>
      <div class="card-title">Book Ambulance</div>
      <div class="card-desc">Request immediate emergency dispatch</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="/hospital" class="action-card secondary">
      <div class="card-icon">🏥</div>
      <div class="card-title">Hospital Queue</div>
      <div class="card-desc">View current wait times &amp; queue status</div>
      <div class="card-arrow">→</div>
    </a>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    All emergency services operational
  </div>
</div>
</body>
</html>
