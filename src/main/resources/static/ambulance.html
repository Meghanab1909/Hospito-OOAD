<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Ambulance Map</title>
  <style>
    body { margin:0; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f5f3f0; }
    .map {
      position: relative;
      width: 800px;
      height: 450px;
      border-radius: 24px;
      overflow: hidden;
      background:
        linear-gradient(90deg, transparent 48%, rgba(255,255,255,0.6) 49%, rgba(255,255,255,0.6) 51%, transparent 52%),
        linear-gradient(transparent 48%, rgba(255,255,255,0.6) 49%, rgba(255,255,255,0.6) 51%, transparent 52%),
        #dbeafe;
      background-size: 120px 120px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }
    .road {
      position:absolute;
      left: 40px;
      right: 40px;
      top: 50%;
      height: 10px;
      background: #475569;
      transform: translateY(-50%);
      border-radius: 999px;
    }
    .ambulance {
      position:absolute;
      top: calc(50% - 40px);
      right: -60px;
      font-size: 42px;
      animation: drive 6s linear infinite;
    }
    .hospital {
      position:absolute;
      left: 30px;
      top: calc(50% - 50px);
      font-size: 54px;
    }
    @keyframes drive {
      0% { right: -60px; }
      100% { right: calc(100% - 110px); }
    }
  </style>
</head>
<body>
  <div class="map">
    <div class="road"></div>
    <div class="ambulance">🚑</div>
    <div class="hospital">🏥</div>
  </div>
</body>
</html>
